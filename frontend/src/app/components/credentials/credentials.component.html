<div style="width:100%;max-width:500px;animation:fadeIn 0.4s ease">

  <!-- Header — now shows the current module info -->
  <div style="margin-bottom:24px;text-align:center">
    <h1 style="font-size:20px;font-weight:700;letter-spacing:-0.03em;margin-bottom:6px">AWS Credentials</h1>
    <p style="color:var(--text-2);font-size:13px">Enter once — used across all scan phases</p>
  </div>

  <div *ngIf="error" style="background:var(--red-dim);border:1px solid var(--red-b);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--red);display:flex;gap:8px">
    <span>⚠</span><span>{{error}}</span>
  </div>

  <div class="card" style="overflow:hidden">
    <!-- Access Key -->
    <div style="padding:12px 16px">
      <div style="font-size:10px;font-weight:600;color:var(--text-3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.07em">Access Key ID</div>
      <input autofocus autocomplete="off" type="text" [(ngModel)]="accessKey" placeholder="AKIAIOSFODNN7EXAMPLE"
        style="background:none;border:none;outline:none;font-family:var(--font-mono);font-size:12px;color:var(--text-1);width:100%"/>
    </div>
    <div style="height:1px;background:var(--border)"></div>
    <!-- Secret Key -->
    <div style="padding:12px 16px">
      <div style="font-size:10px;font-weight:600;color:var(--text-3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.07em">Secret Access Key</div>
      <div style="display:flex;align-items:center;gap:8px">
        <input autocomplete="off" [type]="showSecret?'text':'password'" [(ngModel)]="secretKey" placeholder="wJalrXUtnFEMI/K7MDENG/…"
          style="background:none;border:none;outline:none;font-family:var(--font-mono);font-size:12px;color:var(--text-1);flex:1"/>
        <button (click)="showSecret=!showSecret" style="background:none;border:none;cursor:pointer;color:var(--text-3);font-size:11px;flex-shrink:0">
          {{showSecret?'hide':'show'}}
        </button>
      </div>
    </div>
    <div style="height:1px;background:var(--border)"></div>
    <!-- Region / All Regions -->
    <div style="padding:12px 16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.07em">
          Region <span style="font-weight:400;opacity:0.6">(Optional)</span>
        </div>
        <!-- All Regions toggle -->
        <button (click)="toggleAllRegions()"
          [style.background]="allRegions?'var(--accent)':'var(--surface-3)'"
          [style.color]="allRegions?'#fff':'var(--text-2)'"
          style="display:flex;align-items:center;gap:6px;border:none;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s">
          <span style="width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.3);display:inline-flex;align-items:center;justify-content:center;font-size:9px">{{allRegions?'✓':'⊕'}}</span>
          Scan All Regions
        </button>
      </div>
      <select [(ngModel)]="region" [disabled]="allRegions"
        [style.opacity]="allRegions?'0.35':'1'"
        style="background:none;border:none;outline:none;font-family:var(--font-mono);font-size:12px;color:var(--text-1);width:100%;cursor:pointer">
        <option value="">{{allRegions ? 'All regions will be scanned' : 'Select region (defaults to us-east-1)'}}</option>
        <option *ngFor="let r of regions" [value]="r">{{r}}</option>
      </select>
      <div *ngIf="allRegions" style="margin-top:6px;font-size:11px;color:var(--accent);display:flex;align-items:center;gap:5px">
        <span>ℹ</span> All {{regions.length}} AWS regions will be scanned — may take longer
      </div>
    </div>
  </div>

  <button [disabled]="!valid" (click)="submit()"
    [style.background]="valid?'var(--accent)':'var(--surface-2)'"
    [style.color]="valid?'#fff':'var(--text-3)'"
    [style.box-shadow]="valid?'0 0 16px var(--accent)30':'none'"
    style="width:100%;margin-top:14px;padding:11px 0;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s">
    Start Scan →
  </button>

  <div style="display:flex;gap:16px;margin-top:14px;justify-content:center">
    <span *ngFor="let t of ['Read-only access','Not stored','AWS SDK encrypted']"
      style="font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:4px">
      <span style="color:var(--green)">✓</span>{{t}}
    </span>
  </div>
</div>
